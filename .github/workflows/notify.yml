name: Bitable 任务通知

on:
  schedule:
    - cron: '*/1 * * * *'  # 每1分钟运行一次（GitHub实际延迟约3-5分钟）
  workflow_dispatch:  # 支持手动触发

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore notified cache
        uses: actions/cache@v4
        with:
          path: notified_tasks.json
          key: notified-tasks-${{ github.run_id }}
          restore-keys: notified-tasks-

      - name: Run notification check
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          BITABLE_APP_TOKEN: ${{ secrets.BITABLE_APP_TOKEN }}
          BITABLE_TABLE_ID: ${{ secrets.BITABLE_TABLE_ID }}
        run: python notify.py
