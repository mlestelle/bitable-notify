# ⚠️ 已废弃：服务已迁移到 Render 平台，此 workflow 不再使用
# 如需恢复，删除下方 on 中的注释
name: Bitable 任务通知（已停用）

on:
  # repository_dispatch:
  #   types: [check-tasks]
  # workflow_dispatch:
  workflow_dispatch:  # 仅保留手动触发用于调试
    inputs:
      debug:
        description: '调试模式'
        required: false
        default: 'false'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore notified cache
        uses: actions/cache@v4
        with:
          path: notified_tasks.json
          key: notified-tasks-${{ github.run_id }}
          restore-keys: notified-tasks-

      - name: Run notification check
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          BITABLE_APP_TOKEN: ${{ secrets.BITABLE_APP_TOKEN }}
          BITABLE_TABLE_ID: ${{ secrets.BITABLE_TABLE_ID }}
        run: python notify.py
